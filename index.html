<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
        Content Security Policy:
          script-src   — allows only scripts from this origin ('self'); mqtt.js is now
                         vendored locally so no external CDN or hash allowance is needed
          connect-src  — allows ws:// and wss:// for MQTT broker WebSocket connections
          img-src      — allows local images (MQTT icon, favicon)
          style-src    — allows this origin's stylesheet
          default-src  — blocks everything else
    -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; script-src 'self'; connect-src ws: wss:; img-src 'self'; style-src 'self'">
    <title>MQTT Demo</title>
    <link rel="icon" type="image/svg+xml" href="mqtt-icon.svg">
    <link rel="stylesheet" href="style.css">
    <!-- mqtt.js 5.10.4 vendored locally from npm; integrity verified via SHA-384 SRI -->
    <script src="mqtt.min.js"
            integrity="sha384-Bi12oAdYr14AFkifhhBlMiJVpDvueq9uEXPV1B+vtGzvngGIdSIi/k4kDG+YDnyY"></script>
</head>
<body>
    <script src="script.js"></script>
</body>
</html>
